packages:
  "framer-motion": "For fluid page transitions and micro-interactions"
  "recharts": "For rendering beautiful data visualizations in the recruiter dashboard"
  "zustand": "For lightweight global state management (candidate session and recruiter toggle)"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to resolve Tailwind CSS class conflicts"
  "date-fns": "For formatting dates cleanly"
  "lucide-react": "For beautiful consistent icons"

images:
  - path: "artifacts/skill-engine/public/images/hero-bg.png"
    description: "Abstract, soft, premium gradient background with flowing geometric shapes in subtle teal, slate, and light blue. Minimalist, clean, and highly professional."
    aspect_ratio: "16:9"
  - path: "artifacts/skill-engine/public/images/logo-icon.png"
    description: "A minimalist, abstract logo mark representing equality, balance, and skills. Geometric, clean lines, rendered in deep teal and indigo on a transparent background."
    aspect_ratio: "1:1"

notes:
  - "Assuming @workspace/api-client-react provides all TanStack Query hooks exported at the top level."
  - "The application uses purely client-side routing via wouter."
  - "Using zustand to persist the candidateId in local storage so they don't lose their session."
