kind = "slides"
previewPath = "/system-design-deck/"
title = "System Design & Architecture"
version = "1.0.0"
id = "artifacts/system-design-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
localPort = 24950
name = "web"
paths = ["/system-design-deck/"]

[services.development]
run = "pnpm --filter @workspace/system-design-deck run dev"

[services.env]
PORT = "24950"
BASE_PATH = "/system-design-deck/"

[services.production]
build = ["pnpm", "--filter", "@workspace/system-design-deck", "run", "build"]
publicDir = "artifacts/system-design-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
