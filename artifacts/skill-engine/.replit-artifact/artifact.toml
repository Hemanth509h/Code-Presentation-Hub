kind = "web"
previewPath = "/"
title = "Gender-Neutral Skill Assessment Engine"
version = "1.0.0"
id = "artifacts/skill-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21181
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/skill-engine run dev"

[services.env]
PORT = "21181"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/skill-engine", "run", "build"]
publicDir = "artifacts/skill-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
